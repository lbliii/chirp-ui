name: Changelog Fragment Check

on:
  pull_request:
    branches: [main]

jobs:
  changelog-fragment:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changelog fragment
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Use the three-dot (merge-base) diff — the PR's OWN changes — not a
          # two-dot diff against the moving base tip. With two-dot, any commit
          # that lands on main after the PR is branched gets mis-attributed to
          # this PR (e.g. another PR's src/ files), producing false changelog
          # failures. Three-dot ("$BASE...$HEAD") matches GitHub's Files-changed.

          # Only enforce when src/ is modified
          if ! git diff --name-only "$BASE...$HEAD" | grep -q '^src/'; then
            echo "No src/ changes — changelog fragment not required."
            exit 0
          fi

          # Look for new fragments in changelog.d/. Require the flat, towncrier-
          # discoverable form: changelog.d/<slug>.<type>.md (optionally with a
          # numeric counter, and a leading "+" orphan prefix for issue-less notes).
          # Towncrier derives the category from the FILENAME via a non-recursive
          # listdir — fragments dropped in a changelog.d/<type>/ SUBDIRECTORY are
          # silently ignored at build time, so the gate rejects them here instead.
          TYPES='added|changed|deprecated|removed|fixed|security'
          if git diff --name-only --diff-filter=A "$BASE...$HEAD" \
            | grep -qE "^changelog\.d/[^/]+\.($TYPES)(\.[0-9]+)?\.md$"; then
            echo "Changelog fragment found."
            exit 0
          fi

          # Release-prep PRs consume fragments into CHANGELOG.md instead of adding
          # a new fragment.
          if git diff --name-only "$BASE...$HEAD" | grep -q '^CHANGELOG\.md$' \
            && git diff --name-only --diff-filter=D "$BASE...$HEAD" | grep -q '^changelog\.d/.*\.md$'; then
            echo "Release changelog update found."
            exit 0
          fi

          echo "::error::PR changes src/ but no new towncrier-discoverable changelog fragment."
          echo "Add a flat fragment (e.g. changelog.d/+my-change.added.md — NOT changelog.d/added/my-change.md, which towncrier ignores) or label the PR with 'skip-changelog'."
          exit 1
