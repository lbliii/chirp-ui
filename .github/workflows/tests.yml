name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Backstop: the unit gate normally finishes in ~3 min. A generous ceiling
    # bounds any hung step (e.g. a stalled `setup-uv` interpreter download) at
    # 20 min instead of GitHub's 6-hour default.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        # Tight ceiling on the exact step that stalled 13.5 min in run
        # 27700383948 — fail fast with a clearly-named step instead of
        # leaning on the coarse job-level timeout.
        timeout-minutes: 3
        with:
          python-version: "3.14t"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Cache uv dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run CI
        env:
          CI: true
          PYTHON_GIL: "0"
        run: uv run poe ci

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        # Tight ceiling on the exact step that stalled 13.5 min in run
        # 27700383948 — fail fast with a clearly-named step instead of
        # leaning on the coarse job-level timeout.
        timeout-minutes: 3
        with:
          python-version: "3.14t"

      - name: Cache uv dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  # Advisory JS lint over the Bengal theme's assets/js. Kept as its own job
  # (not part of the required `test`/`lint` jobs and not wired into `poe ci`)
  # because the theme JS still carries ~305 advisory biome warnings. The gate
  # that matters — `noUndeclaredVariables` — IS an error, so this job fails if a
  # genuinely-undefined global slips in (e.g. a missing CDN library), while the
  # style/complexity debt stays advisory until it is paid down.
  lint-js:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run biome over theme assets/js
        # biome 1.9.4 is a standalone Rust binary fetched on demand — no Node
        # build step, free-threading-safe. Config: ./biome.json.
        run: npx --yes @biomejs/biome@1.9.4 check src/bengal_themes/chirp_theme/assets/js
