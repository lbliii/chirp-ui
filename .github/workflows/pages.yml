name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        timeout-minutes: 3
        with:
          python-version: "3.14t"

      - name: Cache uv dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --group docs
        env:
          PYTHON_GIL: "0"

      # Gate the public deploy BEFORE the cached Bengal build runs.
      # `make release-preflight` enforces artifact freshness for PyPI releases;
      # the Pages path reused none of it, so a push that left chirpui.css /
      # manifest.json / COMPONENT-OPTIONS.md stale would still publish the live
      # site. `poe deploy-gate` = verify-generated (build-css/manifest/docs
      # freshness) + theme-guards (template reachability + packaging/icon
      # reference). No JS lint, no full test suite, so it fails fast and keeps
      # the cached-build flow cheap.
      - name: Gate deploy on freshness + theme guards
        run: uv run poe deploy-gate
        env:
          PYTHON_GIL: "0"

      - name: Cache Bengal build state
        uses: actions/cache@v6
        with:
          path: site/.bengal
          key: bengal-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml', 'site/config/**', 'site/content/**', 'site/assets/**', 'src/bengal_themes/chirp_theme/**', 'src/chirp_ui/components.py', 'src/chirp_ui/manifest.py', 'src/chirp_ui/templates/**') }}
          # No restore-keys - we want exact match for correctness

      - name: Build documentation site
        run: uv run bengal build --source site --environment production --clean-output
        env:
          PYTHON_GIL: "0"

      - name: Emit Chirp UI manifest
        run: |
          mkdir -p site/public
          uv run python -m chirp_ui.manifest --json > site/public/chirpui.manifest.json
        env:
          PYTHON_GIL: "0"

      - name: Prepare for upload
        run: |
          touch site/public/.nojekyll
          echo "" > site/public/.gitignore

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
