name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14t"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --group docs
        env:
          PYTHON_GIL: "0"

      - name: Cache Bengal build state
        uses: actions/cache@v5
        with:
          path: site/.bengal
          key: bengal-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml', 'site/config/**', 'site/content/**', 'site/assets/**', 'src/bengal_themes/chirp_theme/**', 'src/chirp_ui/components.py', 'src/chirp_ui/manifest.py', 'src/chirp_ui/templates/**') }}
          # No restore-keys - we want exact match for correctness

      - name: Build documentation site
        run: uv run bengal build --source site --environment production --clean-output
        env:
          PYTHON_GIL: "0"

      - name: Assemble static component showcase
        run: bash scripts/assemble-static-showcase.sh "$GITHUB_WORKSPACE/site/public/showcase"

      - name: Guard published showcase against placeholder leakage
        # Fail the deploy if /showcase/ still serves the section-index/build-command
        # placeholder ("No section content yet" / "injected here after ...") instead
        # of the assembled gallery the home-page "Browse components" CTA points at.
        run: |
          out="$GITHUB_WORKSPACE/site/public/showcase/index.html"
          if [ ! -f "$out" ]; then
            echo "::error::$out missing — the static showcase was not assembled."
            exit 1
          fi
          if grep -Fq 'injected here after' "$out" || grep -Fq 'No section content' "$out"; then
            echo "::error::Published showcase still contains the placeholder sentinel; the real gallery was not injected over the section index."
            exit 1
          fi
          if ! grep -Fq 'Complete Component Showcase' "$out"; then
            echo "::error::Published showcase is missing the assembled gallery marker; a fallback page was served instead of the static showcase."
            exit 1
          fi
          echo "✓ /showcase/ serves the assembled gallery (no placeholder sentinels)"

      - name: Emit Chirp UI manifest
        run: |
          mkdir -p site/public
          uv run python -m chirp_ui.manifest --json > site/public/chirpui.manifest.json
        env:
          PYTHON_GIL: "0"

      - name: Prepare for upload
        run: |
          touch site/public/.nojekyll
          echo "" > site/public/.gitignore

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
