# Production Environment
# =======================

site:
  # FULL absolute origin (scheme + host + path-prefix). Bengal derives the
  # canonical/og:url surface, og:image, sitemap.xml <loc> entries, and the
  # robots.txt Sitemap: directive from baseurl — a path-only "/chirp-ui" makes
  # all of those relative and machine-invalid for crawlers/social scrapers.
  # The site deploys to GitHub Pages under /chirp-ui. (#169)
  baseurl: "https://lbliii.github.io/chirp-ui"

build:
  incremental: true
  strict_mode: true

assets:
  # TODO(chirp-ui): Bengal's CSS minifier corrupts the chirp-ui `@scope (...) to (...)`
  # envelope (drops scoped rules on the minified Pages build). Not patched here;
  # tracked in https://github.com/lbliii/chirp-ui/issues/247 / upstream
  # https://github.com/lbliii/bengal/issues/510. Once a fixed Bengal release is
  # pinned, verify @scope blocks survive minification.
  minify: true
  fingerprint: true
