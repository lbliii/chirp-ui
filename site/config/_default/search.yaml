# Search Configuration
# ====================
#
# Lunr-backed client-side search. The prebuilt index (search-index.json) is
# generated by Bengal's LunrIndexGenerator and loaded by core/search.js.
#
# Which keys take effect today:
#   - lunr.prebuilt  -> honored by Bengal (emits search-index.json at build).
#   - lunr.preload   -> honored by the theme (base.html emits
#                       <meta name="bengal:search_preload">; search.js reads it).
#   - ui.modal       -> honored by the theme (renders the Cmd+K modal).
#   - ui.recent_searches / ui.placeholder -> honored by the modal/search page.
#
# Note: min_query_length and max_results mirror the CONFIG constants in
# core/search.js (keep in sync if those change). Field ranking weights are baked
# into both LunrIndexGenerator.BOOSTS (Bengal) and the runtime builder in
# search.js — they are NOT read from this file, but are recorded here so the
# ranking contract is visible in one place:
#
#     title 10  |  search_keywords 8  |  description 5  |  tags 3
#     section 2 |  author 2           |  content 1      |  kind 1
#
# search_keywords (8x) is the author's escape hatch for product nouns that have
# no dedicated page — e.g. "button" resolving to docs/components/controls. The
# weight was inert noise while 0 pages populated the field; per-page frontmatter
# (search_keywords:) now carries it, so the boost finally earns its rank.

search:
  enabled: true
  lunr:
    prebuilt: true
    # Minimum characters before a query runs (mirrors search.js CONFIG).
    min_query_length: 2
    max_results: 50
    # smart = load index on intent (hover/focus/Cmd); immediate = warm on idle;
    # lazy = load on first keystroke. 'smart' is the right default for this site.
    preload: smart
  ui:
    modal: true
    recent_searches: 5
    placeholder: "Search documentation..."
  analytics:
    enabled: false
    event_endpoint: null
