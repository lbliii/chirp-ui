# Menu Configuration
# ===================
#
# Top navigation is defined explicitly in `main` so dogfood layout families
# group under a single "Layouts" dropdown instead of crowding the header.
# Bengal skips auto-discovery when `main` is non-empty.
#
# The `footer` menu gives those families an explicit, discoverable home
# in the site footer (the theme renders `footer`, falling back to `main`).

menu:
  main:
    - name: "Component showcase"
      url: "https://chirp-ui-showcase-production.up.railway.app"
      weight: 5
      icon: layers

    - name: "Documentation"
      url: "/docs/"
      weight: 10
      identifier: documentation

    - name: "Get Started"
      url: "/docs/get-started/"
      parent: documentation
      weight: 10

