# Menu Configuration
# ===================
#
# The top navigation auto-discovers top-level content sections (ordered by
# weight) when no `main` menu is defined, so blog/, tutorial/, resume/,
# authors/, and changelog/ surface in the header automatically.
#
# The `footer` menu below gives those families an explicit, discoverable home
# in the site footer (the theme renders `footer`, falling back to `main`).

menu:
  footer:
    - name: "Components"
      url: "/docs/components/"
      weight: 4
    - name: "Reference"
      url: "/docs/reference/"
      weight: 6
    - name: "Blog"
      url: "/blog/"
      weight: 10
    - name: "Tutorial"
      url: "/tutorial/"
      weight: 20
    - name: "Authors"
      url: "/authors/"
      weight: 30
    - name: "Resume"
      url: "/resume/"
      weight: 40
    - name: "Notebooks"
      url: "/notebook/"
      weight: 45
    - name: "Changelog"
      url: "/changelog/"
      weight: 50
    - name: "Releases"
      url: "/releases/"
      weight: 60

  extra:
    # Points at the live Railway-hosted showcase app (feat(showcase) #245),
    # not the internal /showcase/ route. The /showcase/ section is hidden from
    # the auto-nav (menu: false in its _index.md) so this entry renders instead.
    - name: "Component showcase"
      url: "https://chirp-ui-showcase-production.up.railway.app"
      weight: 5
      icon: layers
