[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "chirp-ui"
version = "0.11.0"
description = "A love letter to CSS and HTML over the wire — gorgeous Chirp components, htmx-native, Alpine.js for interactivity"
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
authors = [{ name = "Bengal Contributors", email = "lbeezr@icloud.com" }]
keywords = [
    "components",
    "ui",
    "htmx",
    "kida",
    "chirp",
    "templates",
    "web",
    "html",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Internet :: WWW/HTTP :: Dynamic Content",
    "Topic :: Text Processing :: Markup :: HTML",
    "Typing :: Typed",
]
dependencies = [
    "kida-templates>=0.11.0", # Template engine (strict undefined, Mapping-soft optional chaining, markdown-safe Markup)
]

[project.optional-dependencies]
showcase = ["bengal-chirp>=0.10.0"] # For examples/component-showcase (0.10+ auto-wires CSP nonces via use_chirp_ui)
mcp = ["mcp>=1.0"]

[project.scripts]
chirp-ui = "chirp_ui.__main__:main"

[project.entry-points."bengal.themes"]
chirp-theme = "bengal_themes.chirp_theme"

[project.urls]
Homepage = "https://github.com/lbliii/chirp-ui"
Repository = "https://github.com/lbliii/chirp-ui"

# =============================================================================
# uv — Workspace development
# =============================================================================
# For local development with kida in a workspace, add to workspace root:
#   [tool.uv.workspace]
#   members = ["chirp-ui", "path/to/kida"]
# Standalone installs and CI use kida-templates from PyPI.

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
chirp_ui = [
    "py.typed",
    "manifest.json",
    "templates/**/*.html",
    "templates/**/*.css",
    "templates/**/*.js",
    "templates/**/*.svg",
]
"bengal_themes.chirp_theme" = [
    "theme.toml",
    "templates/**/*.html",
    "assets/**/*",
]

# =============================================================================
# Ruff — Linter & Formatter
# =============================================================================
# Matches bengal/kida/chirp rule set

[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (unused imports, variables, etc.)
    "UP",   # pyupgrade — Python modernization
    "B",    # flake8-bugbear — common bugs and design problems
    "SIM",  # flake8-simplify — simplify code
    "I",    # isort — import sorting
    "N",    # pep8-naming — naming conventions
    "PIE",  # misc lints (unnecessary pass, duplicate dict keys, etc.)
    "PERF", # perflint — performance anti-patterns
    "C4",   # unnecessary comprehensions/list()/dict() calls
    "RUF",  # Ruff-specific (unused noqa, mutable class defaults, etc.)
    "PT",   # flake8-pytest-style — pytest best practices
]
ignore = [
    "E501", # line too long — handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]   # Allow unused imports in __init__ files (re-exports)
"tests/**/*.py" = ["S101"]   # Allow assert in tests
"tests/browser/**/*.py" = ["S101", "PT004", "PT005"]  # Browser tests use async fixtures

# =============================================================================
# ty — Type Checker (Rust-based, Astral)
# =============================================================================

[tool.ty.environment]
python-version = "3.14"

[tool.ty.src]
exclude = ["dist/", "build/", "tests/"]

[tool.ty.rules]
unused-ignore-comment = "warn"

# =============================================================================
# Pytest
# =============================================================================

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
# -n auto / --dist worksteal: run the ~2700 unit tests across all cores
#   (measured ~2.15x faster). All shared state (validation strict flag, named-
#   color registry) is ContextVar-isolated, so xdist's separate worker processes
#   are safe — no test needs an xdist_group. worksteal keeps the handful of long
#   Bengal-build tests from stranding a single worker.
# --timeout: a default per-test ceiling so one wedged test fails fast (with a
#   traceback) instead of stalling CI. thread method (not the POSIX signal
#   default) is required: signal arms SIGALRM only on the main thread and can't
#   interrupt the Bengal tests' blocking subprocess.run, and it is also
#   free-threading-safe. The browser tasks clear addopts via --override-ini.
addopts = [
    "-ra",
    "-q",
    "--strict-markers",
    "--import-mode=importlib",
    "--ignore=tests/browser",
    "-n", "auto",
    "--dist", "worksteal",
    "--timeout=120",
    "--timeout-method=thread",
]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "contract: product/API/registry/template/CSS contract tests that protect shipped behavior",
    "docs_contract: documentation, generated-docs, and source-map contract tests",
    "evidence: executable proof for research, recipe, plan, or promotion-boundary claims",
    "research: planning and analysis ratchets that should not imply public API",
    "candidate: private candidate/reference fixtures that are explicitly not public API",
    "integration: integration tests requiring full app setup",
    "browser: browser-backed Playwright tests",
    "swap_lifecycle: boosted-nav Alpine lifecycle tests; timing/CDN-sensitive, kept in the full release browser suite but deselected from the fast chrome gate (deselect with '-m \"not swap_lifecycle\"')",
]

# =============================================================================
# Coverage
# =============================================================================

[tool.coverage.run]
source = ["src/chirp_ui", "src/bengal_themes"]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = true
precision = 1
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@overload",
    "def __repr__",
]

# =============================================================================
# Development Dependencies (PEP 735 — install with: uv sync --group dev)
# =============================================================================

[dependency-groups]
docs = [
    "bengal>=0.5.1",
    "lunr>=0.7.0",
]
dev = [
    # Bengal-backed theme packaging/build tests run in the normal test suite
    "bengal>=0.5.1",
    # Showcase HTTP integration (tests/test_data_integration.py) — first-class CI proof
    "bengal-chirp>=0.10.0",
    # Task runner (poe tasks in [tool.poe.tasks])
    "poethepoet>=0.32.0",
    # Testing
    "pytest>=9.0.2",
    "pytest-asyncio>=0.25.0",
    "pytest-cov>=6.0.0",
    "pytest-timeout>=2.3.0",
    "pytest-xdist>=3.6.0",
    "tinycss2>=1.4.0",
    # Type Checking
    "ty>=0.0.11",
    # Linting & Formatting
    "ruff>=0.15.1", # 0.15.1+ fixes except-parenthesis bug (PEP 758 + as clause)
    # Pre-commit
    "pre-commit>=4.0.0",
    # Changelog
    "towncrier>=24.8.0",
    # MCP server tests (optional runtime extra)
    "mcp>=1.0",
    "itsdangerous>=2.2.0",
]
browser = [
    # Browser integration tests (Playwright + real Chirp app)
    "bengal-chirp>=0.10.0",
    "playwright>=1.50.0",
    "pytest-asyncio>=0.25.0",
    "bengal-pounce>=0.8.2",
]

# =============================================================================
# Task Runner (poethepoet) — use: poe <task>
# =============================================================================

[tool.poe.tasks]
# Testing
test = { cmd = "pytest", help = "Run full test suite" }
test-fast = { cmd = "pytest tests/ -x -q --timeout=10", help = "Fast feedback loop" }
test-cov = { cmd = "pytest tests/ --cov=chirp_ui --cov=bengal_themes --cov-report=term-missing", help = "Run tests with coverage" }
test-js = { cmd = "npm test", help = "Run JavaScript island helper tests with Vitest" }
test-browser = { cmd = "pytest tests/browser/ -q --timeout=30 --override-ini='addopts='", help = "Run browser integration tests (requires: uv sync --group browser && playwright install chromium)" }
test-browser-chrome-check = { cmd = "pytest tests/browser/test_alpine_lifecycle.py tests/browser/test_context_rail_gauntlet.py tests/browser/test_shell_nav_drawer_gauntlet.py tests/browser/test_data_grid_gauntlet.py tests/browser/test_context_menu_gauntlet.py tests/browser/test_menubar_gauntlet.py tests/browser/test_navigation_menu_gauntlet.py tests/browser/test_hover_card_gauntlet.py tests/browser/test_input_otp.py tests/browser/test_combobox_gauntlet.py tests/browser/test_command_palette.py tests/browser/test_date_picker_gauntlet.py tests/browser/test_composer_gauntlet.py tests/browser/test_rail_to_tray_chrome.py tests/browser/test_application_chrome_gauntlet.py tests/browser/test_bengal_docs_chrome.py tests/browser/test_docs_nav_labels.py tests/browser/test_docs_landmarks_a11y.py -m 'not swap_lifecycle' -q --timeout=30 --override-ini='addopts='", help = "Run Alpine-liveness proof + route-context rail gauntlet + mobile nav-drawer gauntlet + data-grid a11y gauntlet + context-menu a11y gauntlet + menubar roving-focus gauntlet + navigation-menu flyout gauntlet + hover-card delay/focus gauntlet + input-otp gauntlet + combobox a11y gauntlet + command-palette arrow-nav + date-picker a11y gauntlet + showcase composer Enter-to-send gauntlet + focused application chrome + docs-nav/landmark a11y browser proof (deselects timing-sensitive swap_lifecycle tests)" }
test-browser-chrome = { sequence = ["docs-build-all", "test-browser-chrome-check"], help = "Build docs output, then run focused application chrome + docs-chrome a11y browser proof" }
ci-browser = { sequence = ["test-browser"], help = "Browser integration tests (release gate)" }

# Type Checking
ty = { cmd = "ty check src/chirp_ui/", help = "Run ty type checker" }
ty-strict = { cmd = "ty check src/chirp_ui/ --error-on-warning", help = "Strict type checking" }

# Linting & Formatting
lint = { cmd = "ruff check .", help = "Run ruff linter" }
lint-fix = { cmd = "ruff check . --fix", help = "Run ruff linter with auto-fix" }
format = { cmd = "ruff format .", help = "Format code with ruff" }
format-check = { cmd = "ruff format . --check", help = "Check formatting" }
# Advisory JS lint (biome) over the Bengal theme's assets/js. NOT wired into
# `ci`/`check` on purpose: the theme JS still carries ~305 advisory warnings
# (useArrowFunction/useTemplate/noUnusedVariables, etc.) that are not yet fixed.
# `noUndeclaredVariables` IS an error, so this fails on a genuinely-undefined
# global (e.g. a missing CDN library) while staying green on style debt.
# Run via `uv run poe lint-js`; CI runs it in a separate non-required job.
lint-js = { cmd = "npx --yes @biomejs/biome@1.9.4 check src/bengal_themes/chirp_theme/assets/js", help = "Advisory biome lint over the Bengal theme assets/js (not part of `poe ci`)" }
lint-js-fix = { cmd = "npx --yes @biomejs/biome@1.9.4 check --write src/bengal_themes/chirp_theme/assets/js", help = "Apply biome's safe auto-fixes to the Bengal theme assets/js" }
build-css = { cmd = "python scripts/build_chirpui_css.py", help = "Concat CSS partials into chirpui.css" }
build-css-subset = { cmd = "python scripts/build_chirpui_css.py --components card,btn,badge", help = "Example manifest-driven CSS subset (pass --output)" }
build-css-check = { cmd = "python scripts/build_chirpui_css.py --check", help = "Fail if chirpui.css is stale relative to partials" }
build-manifest = { cmd = "python scripts/build_manifest.py", help = "Emit src/chirp_ui/manifest.json from the registry" }
build-manifest-check = { cmd = "python scripts/build_manifest.py --check", help = "Fail if manifest.json is stale relative to the registry" }
build-docs = { cmd = "python scripts/build_component_options.py", help = "Regenerate docs/COMPONENT-OPTIONS.md API reference section from the manifest" }
build-docs-check = { cmd = "python scripts/build_component_options.py --check", help = "Fail if docs/COMPONENT-OPTIONS.md is stale relative to the manifest" }
build-component-index = { cmd = "python scripts/build_component_index.py", help = "Regenerate the on-site complete component index (site/content/docs/components/all.md) from the manifest" }
build-component-index-check = { cmd = "python scripts/build_component_index.py --check", help = "Fail if the on-site component index is stale relative to the manifest" }
build-blocks-gallery = { cmd = "python scripts/build_blocks_gallery.py", help = "Regenerate the registry-backed blocks gallery JSON for the component showcase" }
build-blocks-gallery-check = { cmd = "python scripts/build_blocks_gallery.py --check", help = "Fail if the blocks gallery JSON is stale relative to the manifest" }
verify-generated = { sequence = ["build-css-check", "build-manifest-check", "build-docs-check", "build-component-index-check", "build-blocks-gallery-check"], help = "Verify committed generated CSS, manifest, and component reference docs are fresh" }
# Fast theme guards (no site build): template reachability (no orphan partials)
# + packaging/icon-reference (no shipped cruft, no dangling icon names).
theme-guards = { cmd = "pytest tests/test_template_reachability.py tests/test_packaging.py -q", help = "Theme template-reachability + packaging/icon-reference guards" }
# Pre-deploy gate for the GitHub Pages workflow: prove the committed generated
# artifacts are fresh AND the theme is structurally sane before a public build.
# Kept cheap on purpose (no full test suite, no JS lint) so the cached Pages
# build flow is preserved. NOT wired into `ci`/`check` — those run the broader
# suite already; this is the deploy-path entry point.
deploy-gate = { sequence = ["verify-generated", "theme-guards"], help = "Gate the Pages deploy on generated-artifact freshness + theme structural guards" }
escape-audit = { cmd = "python scripts/escape_audit.py", help = "Print Kida escape audit for trusted markup sites" }
css-check = { cmd = "pytest tests/test_css_syntax.py -q", help = "Validate CSS parses cleanly" }
css-contract-check = { cmd = "pytest tests/test_template_css_contract.py -q", help = "Check template classes exist in CSS" }
css-transition-check = { cmd = "pytest tests/test_motion_tokens.py -q", help = "Check transitions and animations use motion tokens" }
css-concat-check = { cmd = "pytest tests/test_chirpui_css_concat.py -q", help = "Check chirpui.css matches partials" }
template-check = { cmd = "python scripts/template_check.py", help = "Strict Kida template verification for chirpui partials (kida check --strict + chirp-ui filter stubs)" }

# Documentation
docs-serve = { cmd = "python scripts/docs_site.py serve", help = "Serve docs site locally" }
docs-build = { cmd = "python scripts/docs_site.py build", help = "Build docs site" }
docs-emit-manifest.shell = "mkdir -p site/public && python -m chirp_ui.manifest --json > site/public/chirpui.manifest.json"
docs-emit-manifest.help = "Emit chirpui component manifest to site/public/chirpui.manifest.json"
docs-build-all = { sequence = ["docs-build", "docs-emit-manifest"], help = "Build Bengal site and emit the component manifest" }

# CI Pipeline
ci = { sequence = [
    "lint",
    "format-check",
    "verify-generated",
    "template-check",
    "css-check",
    "css-contract-check",
    "css-transition-check",
    "css-concat-check",
    "ty",
    "test",
    "test-js",
], help = "Full CI check" }
check = { sequence = [
    "lint",
    "format-check",
    "verify-generated",
    "template-check",
    "css-check",
    "css-contract-check",
    "css-transition-check",
    "ty",
], help = "Quick check (no tests)" }
# Pre-PR gate a contributor runs before opening a PR. Runs the full blocking
# `ci` gate (lint/format/generated-freshness/css/ty/unit/js) AND the docs-chrome
# browser/a11y smoke (`test-browser-chrome` = docs-build-all + the focused
# chrome + docs-nav/landmark a11y Playwright proof). The browser suite is
# intentionally NOT part of `ci` (it must stay fast + green for unit gating and
# needs `--group browser` + a chromium install), so this task layers it on top.
# CI runs the same browser smoke in a separate, NON-REQUIRED job.
pre-pr = { sequence = ["ci", "test-browser-chrome"], help = "Pre-PR gate: full ci + docs-chrome browser/a11y smoke (browser suite is not in ci)" }

# Changelog
changelog = { cmd = "towncrier build --yes", help = "Build changelog from fragments" }
changelog-draft = { cmd = "towncrier build --draft", help = "Preview changelog without writing" }

# Cleanup
clean.shell = """
rm -rf dist build .pytest_cache .coverage htmlcov .ruff_cache .ty_cache
find . -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
"""
clean.help = "Remove build artifacts and caches"

# =============================================================================
# Towncrier — Fragment-based changelog
# =============================================================================

[tool.towncrier]
directory = "changelog.d"
filename = "CHANGELOG.md"
package = "chirp_ui"
package_dir = "src"
title_format = "## [{version}] - {project_date}"
issue_format = "[#{issue}](https://github.com/lbliii/chirp-ui/issues/{issue})"
underlines = ["", "", ""]

[[tool.towncrier.type]]
directory = "added"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "changed"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "deprecated"
name = "Deprecated"
showcontent = true

[[tool.towncrier.type]]
directory = "removed"
name = "Removed"
showcontent = true

[[tool.towncrier.type]]
directory = "fixed"
name = "Fixed"
showcontent = true

[[tool.towncrier.type]]
directory = "security"
name = "Security"
showcontent = true
