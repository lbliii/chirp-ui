{#- chirp-ui: Button component. Use chirpui-btn with variants. Supports loading state for htmx.
    Defaults to type="submit" for form use; pass type="button" for non-form actions.

        {{ btn("Save", variant="primary") }}                → <button type="submit" ...>
        {{ btn("Cancel", type="button") }}                  → <button type="button" ...>
        {{ btn("View", href="/page") }}                     → <a ...>
-#}

{% from "chirpui/spinner.html" import spinner %}

{% def btn(label, variant="", size=none, loading=false, type="submit", href=none, icon=none, cls="",
           attrs="", attrs_map=none, hx_get=none, hx_post=none, hx_put=none,
           hx_patch=none, hx_delete=none, hx_target=none, hx_swap=none,
           hx_trigger=none, hx_include=none, hx_select=none, hx_ext=none,
           hx_vals=none, disabled=false, data_action=none, aria_label=none) %}
{% set _variant = variant | validate_variant_block("btn", "") %}
{% set _bar_size = consume("_bar_density", "") %}
{% set _busy = consume("_suspense_busy", "") %}
{% set _size = (size or _bar_size or "") | validate_size("btn", "") %}
{% set _disabled = disabled or (_busy == "true") %}
{% set base_class = "btn" | bem(variant=_variant, size=_size, modifier="loading" if loading else "", cls=cls) %}
{% set _btn_has_hx_request = hx_get or hx_post or hx_put or hx_patch or hx_delete %}
{% set _btn_has_hx_config = _btn_has_hx_request or hx_target or hx_swap or hx_trigger or hx_include or hx_select or hx_ext or hx_vals %}
{% set _route_attrs = route_link_attrs(href, disabled=_disabled, attrs=attrs, attrs_map=attrs_map) if not _btn_has_hx_config else {} %}
{% if href %}
<a class="{{ base_class }}"{% if not _disabled %} href="{{ href }}"{% endif %}
   {% if aria_label %}aria-label="{{ aria_label }}"{% end %}
   {% if data_action %}data-action="{{ data_action }}"{% end %}
   {% if _disabled %}aria-disabled="true" tabindex="-1"{% end %}
   {{ attrs | html_attrs }}
   {{ attrs_map | html_attrs }}
   {% if not _disabled and _btn_has_hx_request %}hx-boost="false"{% end %}
   {% if not _disabled and _btn_has_hx_request %}hx-select="{{ hx_select if hx_select else "unset" }}"{% end %}
   {% if not _disabled %}{{ _route_attrs | html_attrs }}{% end %}
   {% if not _disabled %}{{ build_hx_attrs(hx_get=hx_get, hx_post=hx_post, hx_put=hx_put,
       hx_patch=hx_patch, hx_delete=hx_delete, hx_target=hx_target, hx_swap=hx_swap,
       hx_trigger=hx_trigger, hx_include=hx_include, hx_ext=hx_ext,
       hx_vals=hx_vals) | html_attrs }}{% end %}>
    {% if icon %}<span class="chirpui-btn__icon">{{ icon | icon }}</span>{% end %}
    <span class="chirpui-btn__label">{{ label }}</span>
</a>
{% else %}
<button type="{{ type }}" class="{{ base_class }}" {% if loading %}aria-busy="true"{% end %}
        {% if aria_label %}aria-label="{{ aria_label }}"{% end %}
        {% if data_action %}data-action="{{ data_action }}"{% end %}
        {% if _disabled %}disabled{% end %}
        {{ attrs | html_attrs }}
        {{ attrs_map | html_attrs }}
        {{ build_hx_attrs(hx_get=hx_get, hx_post=hx_post, hx_put=hx_put,
            hx_patch=hx_patch, hx_delete=hx_delete, hx_target=hx_target, hx_swap=hx_swap,
            hx_trigger=hx_trigger, hx_include=hx_include, hx_select=hx_select,
            hx_ext=hx_ext, hx_vals=hx_vals) | html_attrs }}>
    {% if icon %}<span class="chirpui-btn__icon">{{ icon | icon }}</span>{% end %}
    <span class="chirpui-btn__label">{{ label }}</span>
    <span class="chirpui-btn__spinner" aria-hidden="true">{{ spinner(size="sm") }}</span>
</button>
{% end %}
{% end %}

{% def button_group(cls="") %}
<div class="chirpui-btn-group{{ " " ~ cls if cls else "" }}">
    {% slot %}
</div>
{% end %}
