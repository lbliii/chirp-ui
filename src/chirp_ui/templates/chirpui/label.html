{#- chirp-ui: Label
    Standalone label primitive for custom controls and compact forms.

    Usage:
        from "chirpui/label.html" import ui_label

        {{ ui_label("Email", for_id="email", required=true) }}
-#}

{% def ui_label(text="", for_id="", required=false, hint=none, cls="", attrs_map=none) %}
<label class="chirpui-label{{ " " ~ cls if cls else "" }}"
       {% if for_id %}for="{{ for_id }}"{% end %}
       {{ attrs_map | html_attrs }}>
    <span class="chirpui-label__text">{{ text }}</span>
    {% if required %}<span class="chirpui-label__required" aria-hidden="true">*</span>{% end %}
    {% if hint %}<span class="chirpui-label__hint">{{ hint }}</span>{% end %}
</label>
{% end %}
