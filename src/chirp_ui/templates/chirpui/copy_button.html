{#- chirp-ui: Copy button
    Copies text to clipboard, shows feedback. Requires Alpine.js.

    Usage:
        from "chirpui/copy_button.html" import copy_button
        {{ copy_button("text to copy", label="Copy") }}
-#}

{% def copy_button(text, label="Copy") %}
{% set _role = consume("_streaming_role", "") %}
<button type="button" class="chirpui-btn chirpui-btn--ghost chirpui-btn--sm chirpui-copy-btn{{ " chirpui-copy-btn--" ~ _role if _role else "" }}"
        x-data="chirpuiCopy()"
        data-copy-text="{{ text | e }}"
        data-copy-timeout="1500"
        @click="copy()"
        aria-label="{{ label }}">
    <span class="chirpui-copy-btn__label" x-show="!copied">{{ label }}</span>
    <span class="chirpui-copy-btn__done" x-show="copied" x-cloak>Copied!</span>
</button>
{% end %}
