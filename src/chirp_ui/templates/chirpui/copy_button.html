{#- chirp-ui: Copy button
    Copies text to clipboard, shows feedback. Requires Alpine.js.

    Usage:
        from "chirpui/copy_button.html" import copy_button
        {{ copy_button("text to copy", label="Copy") }}
-#}

{% def copy_button(text, label="Copy") %}
<button type="button" class="chirpui-btn chirpui-btn--ghost chirpui-btn--sm chirpui-copy-btn"
        x-data="{ copied: false }"
        data-copy-text="{{ text | e }}"
        @click="navigator.clipboard?.writeText($el.dataset.copyText||'').then(() => { copied = true; setTimeout(() => copied = false, 1500) })"
        aria-label="{{ label }}">
    <span class="chirpui-copy-btn__label" x-show="!copied">{{ label }}</span>
    <span class="chirpui-copy-btn__done" x-show="copied">Copied!</span>
</button>
{% end %}
