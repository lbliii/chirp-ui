{#- chirp-ui: Tooltip macro
    Wraps child, shows content on hover. Uses data-tooltip and title fallback.

    Usage:
        from "chirpui/tooltip.html" import tooltip

        {% call tooltip("Copy to clipboard") %}
            <button>Copy</button>
        {% end %}
-#}

{% def tooltip(content, position="top") %}
<span class="chirpui-tooltip chirpui-tooltip--{{ position }}" data-chirpui-tooltip data-tooltip="{{ content | e }}" title="{{ content | e }}">
    {% slot %}
</span>
{% end %}
