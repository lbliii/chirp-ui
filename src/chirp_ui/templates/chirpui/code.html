{#- chirp-ui: Code macros
    Inline and block code with chirpui styling.
-#}

{% def code(text, cls="") %}
<code class="chirpui-code{{ " " ~ cls if cls else "" }}">{{ text }}</code>
{% end %}

{% def code_block(text, cls="", copy=false) %}
{% if copy %}
<div class="chirpui-code-block-wrapper{{ " " ~ cls if cls else "" }}">
    <pre class="chirpui-code-block"><code>{{ text }}</code></pre>
    <button type="button" class="chirpui-code-block__copy"
            onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent).then(function(){var b=event.currentTarget;b.textContent='Copied!';setTimeout(function(){b.textContent='Copy'},2000)})"
            aria-label="Copy code">Copy</button>
</div>
{% else %}
<pre class="chirpui-code-block{{ " " ~ cls if cls else "" }}"><code>{{ text }}</code></pre>
{% end %}
{% end %}
