{#- chirp-ui: Code macros
    Inline and block code with chirpui styling.
-#}

{% def code(text, cls="") %}
<code class="chirpui-code{{ " " ~ cls if cls else "" }}">{{ text }}</code>
{% end %}

{% def code_block(text, cls="") %}
<pre class="chirpui-code-block{{ " " ~ cls if cls else "" }}"><code>{{ text }}</code></pre>
{% end %}
