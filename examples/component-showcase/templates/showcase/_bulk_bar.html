{#- Fragment for bulk action bar — shown when rows selected #}
{% from "chirpui/selection_bar.html" import selection_bar %}
{% block bulk_bar %}
{% call selection_bar(count=count, live_region=true, cls="chirpui-bulk-bar") %}
<a href="/data/export?selected={{ selected | join(",") | e }}" class="chirpui-btn chirpui-btn--sm chirpui-btn--secondary"
   target="_blank">
  Export selected
</a>
<a href="#" class="chirpui-btn chirpui-btn--sm chirpui-btn--secondary"
   hx-boost="false"
   hx-get="/data/table"
   hx-include="#data_filters"
   hx-target="#data_table_content"
   hx-swap="innerHTML transition:true">
  Clear
</a>
{% end %}
{% end %}
